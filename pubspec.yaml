name: travel_planner
description: Travel & Event Planner - Flutter Final Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.3

  # Networking (Chopper for external API calls)
  chopper: ^8.3.0

  # Local Database (Drift / SQLite)
  drift: 2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.2
  path: ^1.9.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.4-dev.1
  drift_dev: 2.33.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
